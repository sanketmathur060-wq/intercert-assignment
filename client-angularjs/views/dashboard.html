<div
    ng-controller="UserController"
    class="min-vh-100 bg-light">

    <!-- Navbar -->

    <nav
        class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a
                class="navbar-brand fw-bold">

                Microservices App

            </a>

            <div class="d-flex gap-2">

                <a
                    href="#!/profile"
                    class="btn btn-light">

                    <i
                        class="fas fa-user me-2">
                    </i>

                    Profile

                </a>

                <button
                    class="btn btn-danger"
                    ng-click="logout()">

                    <i
                        class="fas fa-sign-out-alt me-2">
                    </i>

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <!-- Welcome -->

    <div class="container py-5">

        <div
            class="card shadow border-0 rounded-4 p-5 text-center">

            <h1
                class="fw-bold mb-3">

                Welcome
                {{profile.name}}

                🎉

            </h1>

            <p
                class="text-muted">

                You have successfully logged in.

            </p>

        </div>

    </div>

</div>
