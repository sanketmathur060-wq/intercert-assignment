<div
    ng-controller="UserController"
    class="min-vh-100 bg-light">

    <!-- Navbar -->

    <nav
        class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a
                ng-href="#!/dashboard"
                class="navbar-brand fw-bold text-white text-decoration-none">

                Microservices App

            </a>

            <div class="d-flex gap-2">

                <a
                    ng-href="#!/dashboard"
                    class="btn btn-light">

                    ← Dashboard

                </a>

                <button
                    class="btn btn-danger"
                    ng-click="logout()">

                    Logout

                </button>

            </div>

        </div>

    </nav>

    <!-- Profile -->

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-7">

                <div
                    class="card shadow border-0 rounded-4 p-4">

                    <!-- Profile Header -->

                    <div class="text-center mb-4">

                        <img
                            ng-src="{{
                              profile.photoUrl ||
                              'https://via.placeholder.com/150'
                            }}"
                            class="rounded-circle shadow border"
                            width="140"
                            height="140"
                            style="
                              object-fit: cover;
                            ">

                        <h2
                            class="mt-3 fw-bold">

                            {{profile.name}}

                        </h2>

                        <p
                            class="text-muted">

                            User Profile

                        </p>

                    </div>

                    <hr>

                    <!-- Name -->

                    <div class="mb-3">

                        <label
                            class="fw-bold">

                            Name

                        </label>

                        <p class="mb-0">
                            {{profile.name}}
                        </p>

                    </div>

                    <!-- Email -->

                    <div class="mb-3">

                        <label
                            class="fw-bold">

                            Email

                        </label>

                        <p class="mb-0">
                            {{profile.email}}
                        </p>

                    </div>

                    <!-- Phone -->

                    <div class="mb-4">

                        <label
                            class="fw-bold">

                            Phone

                        </label>

                        <p class="mb-0">
                            {{profile.phone}}
                        </p>

                    </div>

                    <!-- Actions -->

                    <div
                        class="d-flex gap-2 flex-wrap">

                        <a
                            ng-href="#!/edit-profile"
                            class="btn btn-primary">

                            Edit Profile

                        </a>

                        <a
                            ng-href="#!/change-password"
                            class="btn btn-warning">

                            Change Password

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
