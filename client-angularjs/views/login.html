<div
    ng-controller="AuthController"
    class="auth-bg min-vh-100 d-flex align-items-center">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card border-0 shadow-lg rounded-4 p-4">

                    <div class="text-center mb-4">

                        <i
                            class="fas fa-user-circle fa-4x text-primary mb-3">
                        </i>

                        <h2 class="fw-bold">
                            Login
                        </h2>

                        <p class="text-muted">
                            Welcome Back
                        </p>

                    </div>

                    <form
                        name="loginForm"
                        ng-submit="login()"
                        novalidate>

                        <!-- Email -->

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                ng-model="email"
                                placeholder="Enter email"
                                autocomplete="off"
                                required>

                            <small
                                class="text-danger"
                                ng-if="
                                loginForm.email.$dirty &&
                                loginForm.email.$error.required">

                                Email is required

                            </small>

                            <small
                                class="text-danger"
                                ng-if="
                                loginForm.email.$dirty &&
                                loginForm.email.$error.email">

                                Enter valid email

                            </small>

                        </div>

                        <!-- Password -->

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                ng-model="password"
                                placeholder="Enter password"
                                autocomplete="off"
                                required>

                            <small
                                class="text-danger"
                                ng-if="
                                loginForm.password.$dirty &&
                                loginForm.password.$error.required">

                                Password is required

                            </small>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            <i
                                class="fas fa-sign-in-alt me-2">
                            </i>

                            Login

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <span class="text-muted">

                            Don't have an account?

                        </span>

                        <a
                            href="#!/register"
                            class="fw-bold text-decoration-none">

                            Register

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
