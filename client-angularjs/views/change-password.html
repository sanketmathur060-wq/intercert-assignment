<div ng-controller="UserController" class="min-vh-100 bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

        <div class="container">

            <a ng-href="#!/profile" class="navbar-brand text-white text-decoration-none fw-bold">

                ← Back to Profile

            </a>

            <button class="btn btn-danger" ng-click="logout()">

                Logout

            </button>

        </div>

    </nav>

    <!-- Change Password -->

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow border-0 rounded-4 p-4">

                    <h2 class="text-center fw-bold mb-4">

                        Change Password

                    </h2>

                    <form name="changePasswordForm" ng-submit="
                        changePasswordForm.$valid &&
                        changePassword()
                        " novalidate>

                        <!-- Old Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                Old Password

                            </label>

                            <input type="password" name="oldPassword" class="form-control" ng-model="oldPassword"
                                required>

                            <small class="text-danger" ng-show="
                                changePasswordForm.oldPassword.$touched &&
                                changePasswordForm.oldPassword.$error.required">

                                Old password is required

                            </small>

                        </div>

                        <!-- New Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                New Password

                            </label>

                            <input type="password" name="newPassword" class="form-control" ng-model="newPassword"
                                ng-minlength="6" required>

                            <small class="text-danger" ng-show="
                                changePasswordForm.newPassword.$touched &&
                                changePasswordForm.newPassword.$error.required">

                                New password is required

                            </small>

                            <small class="text-danger" ng-show="
                                changePasswordForm.newPassword.$touched &&
                                changePasswordForm.newPassword.$error.minlength">

                                Minimum 6 characters required

                            </small>

                        </div>

                        <!-- Confirm Password -->

                        <div class="mb-4">

                            <label class="form-label">

                                Confirm Password

                            </label>

                            <input type="password" name="confirmPassword" class="form-control"
                                ng-model="confirmPassword" required>

                            <small class="text-danger" ng-show="
                                changePasswordForm.confirmPassword.$touched &&
                                changePasswordForm.confirmPassword.$error.required">

                                Confirm password is required

                            </small>

                            <small class="text-danger" ng-show="
                                confirmPassword &&
                                newPassword !== confirmPassword">

                                Passwords do not match

                            </small>

                        </div>

                        <button type="submit" class="btn btn-warning w-100" ng-disabled="
    changePasswordForm.$invalid ||
    newPassword !== confirmPassword">

                            Change Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
